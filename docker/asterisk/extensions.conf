; Dialplan: eingehende Anrufe an unsere Stasis-App (ARI) übergeben.
; ${EXTEN} = volle E.164-Zielrufnummer (DDI), ${CALLERID(num)} = Anrufer.

[globals]
STASIS_APP = voice-agent

[inbound]
; Volle Nummern (Trunk) ODER die Dev-Test-Extension.
exten = _X.,1,NoOp(Eingehender Anruf an ${EXTEN} von ${CALLERID(num)})
 same = n,Answer()
 same = n,Stasis(${STASIS_APP},${EXTEN},${CALLERID(num)})
 same = n,Hangup()

; Dev: feste Test-Durchwahl, falls das Softphone "100" wählt.
exten = 100,1,NoOp(Dev-Testanruf an Voice-Agent)
 same = n,Goto(inbound,_X.,1)
