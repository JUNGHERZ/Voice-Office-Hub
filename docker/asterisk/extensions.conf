; Dialplan: eingehende Anrufe an unsere Stasis-App (ARI) übergeben.
; ${EXTEN} = volle E.164-Zielrufnummer (DDI), ${CALLERID(num)} = Anrufer.

[globals]
STASIS_APP = voice-office-hub

[inbound]
; Volle Nummern (Trunk, E.164) ODER Dev-Test-Durchwahlen (100, 120, 121, 122 …).
; Das Pattern matcht jede gewählte Nummer; ${EXTEN} = die echte DDI → DDI-Routing im Resolver.
; (Früher gab es hier einen 100->Goto(_X.)-Spezialfall, der ${EXTEN} fälschlich als Literal
;  "_X." durchreichte → DDI-Routing unmöglich. Entfernt: 100 matcht das Pattern direkt.)
exten = _X.,1,NoOp(Eingehender Anruf an ${EXTEN} von ${CALLERID(num)})
 same = n,Answer()
 same = n,Stasis(${STASIS_APP},${EXTEN},${CALLERID(num)})
 same = n,Hangup()

; Diagnose: Asterisks eingebauter Echo-Test (OHNE unseren externalMedia-Pfad).
; Hört man sich hier sauber, ist die Softphone<->Asterisk-Strecke ok und das
; Problem liegt in unserer externalMedia-Behandlung.
exten = 199,1,NoOp(Asterisk-interner Echo-Test)
 same = n,Answer()
 same = n,Echo()
 same = n,Hangup()
