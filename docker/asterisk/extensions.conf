; Dialplan: eingehende Anrufe an unsere Stasis-App (ARI) übergeben.
; ${EXTEN} = volle E.164-Zielrufnummer (DDI), ${CALLERID(num)} = Anrufer.

[globals]
STASIS_APP = voice-office-hub

[inbound]
; Volle Nummern (Trunk, E.164) ODER Dev-Test-Durchwahlen (100, 120, 121, 122 …).
; Das Pattern matcht jede gewählte Nummer; ${EXTEN} = die echte DDI → DDI-Routing im Resolver.
; (Früher gab es hier einen 100->Goto(_X.)-Spezialfall, der ${EXTEN} fälschlich als Literal
;  "_X." durchreichte → DDI-Routing unmöglich. Entfernt: 100 matcht das Pattern direkt.)
; Bewusst KEIN Answer() hier: der Anruf wird erst in der Stasis-App (Node) angenommen,
; sobald ein Agent zur DDI passt. Unbekannte Nummern können so VOR dem Answer mit
; "unallocated" (404) abgelehnt werden → das Anrufer-Netz spielt die Standardansage
; ("kein Anschluss"), ohne dass Gebühren/Deepgram-Kosten/Logeinträge entstehen.
exten = _X.,1,NoOp(Eingehender Anruf an ${EXTEN} von ${CALLERID(num)})
 same = n,Stasis(${STASIS_APP},${EXTEN},${CALLERID(num)})
 same = n,Hangup()

; Diagnose: Asterisks eingebauter Echo-Test (OHNE unseren externalMedia-Pfad).
; Hört man sich hier sauber, ist die Softphone<->Asterisk-Strecke ok und das
; Problem liegt in unserer externalMedia-Behandlung.
exten = 199,1,NoOp(Asterisk-interner Echo-Test)
 same = n,Answer()
 same = n,Echo()
 same = n,Hangup()

; Web-Widget-Anrufe (chan_pjsip über WebSocket, Endpoint aus pjsip_webrtc.conf).
; Bewusst eigener Context: NUR 3-stellige Pseudo-DDIs (kein 199-Echo, kein E.164) —
; begrenzt den Missbrauchsradius eines geleakten Widget-SIP-Passworts auf "mit dem
; KI-Agenten sprechen". CALLERID wird pro Anruf eindeutig gesetzt (web-<uniqueid>):
; identifizierbar in den Requests UND kollidiert nie mit dem Trunk-Dedup im callHandler.
; Drittes Stasis-Arg = X-Widget-Token aus dem INVITE (fürs Live-Transkript im Widget).
[webrtc-inbound]
exten = _XXX,1,NoOp(Web-Widget-Anruf an ${EXTEN})
 same = n,Set(CALLERID(num)=web-${UNIQUEID})
 same = n,Set(CALLERID(name)=Web-Widget)
 same = n,Stasis(${STASIS_APP},${EXTEN},${CALLERID(num)},${PJSIP_HEADER(read,X-Widget-Token)})
 same = n,Hangup()
