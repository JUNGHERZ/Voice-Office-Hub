; ─────────────────────────────────────────────────────────────────────────────
; PJSIP-Konfiguration.
;  - Prod (Appliance, empfohlen): SIP-Trunk per ENV (TRUNK_*) — der entrypoint generiert
;    `pjsip_trunk.conf`, das hier via #include geladen wird (IP-gebunden über `identify`).
;  - Dev: lokale Softphone-Endpoints werden NUR erzeugt, wenn DEV_SOFTPHONE_ENABLED=true
;    (entrypoint → `pjsip_local.conf`). Standard: AUS. So existiert auf einer öffentlich
;    erreichbaren Appliance KEIN ratbarer SIP-Account mehr — SIP-Scanner (sipvicious & Co.),
;    die 5060/udp im Minutentakt abklopfen, finden keinen Endpoint und werden abgewiesen.
; ─────────────────────────────────────────────────────────────────────────────

; Globale PJSIP-Härtung: Unidentifizierte (keinem Endpoint zuordenbare) INVITEs werden
; von PJSIP automatisch mit 401 abgewiesen — wir definieren bewusst KEINEN `anonymous`-
; Endpoint, sodass Scanner-/Spoof-Anrufe nicht in den `inbound`-Context (Stasis) gelangen.
; Die Zähler protokollieren/begrenzen wiederholte unidentifizierte Anfragen.
[global]
type = global
unidentified_request_count = 5
unidentified_request_period = 5
unidentified_request_prune_interval = 30

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0

; ENV-gesteuerter Trunk (vom entrypoint erzeugt; leer wenn TRUNK_ENABLED!=true).
; Inbound nur von den Provider-IPs (identify) — kein anonymer Zugang.
#include pjsip_trunk.conf

; Lokale Dev-Softphones (vom entrypoint erzeugt; leer wenn DEV_SOFTPHONE_ENABLED!=true).
; NUR für lokale Tests — niemals auf einem öffentlich erreichbaren Host aktivieren.
#include pjsip_local.conf

; WebRTC-Web-Widget (vom entrypoint erzeugt; leer wenn WEBRTC_ENABLED!=true).
; Browser-Softphone über SIP-over-WebSocket → Context [webrtc-inbound].
#include pjsip_webrtc.conf

; --- PROD: sipgate Trunking (Vorlage) ---------------------------------------
; #SIPID# / #SIPPASSWORD# aus dem sipgate-Trunk-Account einsetzen und aktivieren.
;
; [sipgateregister]
; type = registration
; server_uri = sip:#SIPID#@sipconnect.sipgate.de
; client_uri = sip:#SIPID#@sipconnect.sipgate.de
; contact_user = inbound-calls
; outbound_auth = sipgateauthreg
;
; [sipgateauthreg]
; type = auth
; auth_type = userpass
; username = #SIPID#
; password = #SIPPASSWORD#
;
; [sipgateauth]
; type = auth
; auth_type = userpass
; username = #SIPID#
; password = #SIPPASSWORD#
;
; [sipgateendpoint]
; type = endpoint
; aors = sipgateaor
; context = inbound
; outbound_auth = sipgateauth
; from_domain = sipconnect.sipgate.de
; from_user = #SIPID#
; allow = !all,g722,alaw,ulaw
; direct_media = no
; transport = transport-udp
;
; [sipgateaor]
; type = aor
; contact = sip:sipconnect.sipgate.de
;
; [sipgateidentify]
; type = identify
; match = sipconnect.sipgate.de
; match = 217.10.68.150:5060
; endpoint = sipgateendpoint
