; ─────────────────────────────────────────────────────────────────────────────
; PJSIP-Konfiguration.
;  - Dev: ein lokales Softphone-Endpoint (Zoiper/Linphone) registriert sich.
;  - Prod (Appliance, empfohlen): SIP-Trunk per ENV (TRUNK_*) — der entrypoint generiert
;    `pjsip_trunk.conf`, das hier via #include geladen wird. Die untenstehende SIPGate-Vorlage
;    bleibt nur als manuelle Referenz/Fallback auskommentiert.
; ─────────────────────────────────────────────────────────────────────────────

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0

; ENV-gesteuerter Trunk (vom entrypoint erzeugt; leer wenn TRUNK_ENABLED!=true).
#include pjsip_trunk.conf

; --- DEV: lokales Softphone --------------------------------------------------
; Registrierung z.B. als User "softphone" / Passwort "softphone".
[softphone]
type = endpoint
context = inbound
disallow = all
allow = ulaw,alaw,g722,slin16
auth = softphone-auth
aors = softphone
direct_media = no

[softphone-auth]
type = auth
auth_type = userpass
username = softphone
password = softphone

[softphone]
type = aor
max_contacts = 1

; --- DEV: zweites Softphone als Transfer-Ziel (Stufe D) -----------------------
; Zweiter Client/Account registriert sich als User "101" / Passwort "101".
; transfer_call dialt PJSIP/101 → dieses Telefon klingelt.
[101]
type = endpoint
context = inbound
disallow = all
allow = ulaw,alaw,g722,slin16
auth = 101-auth
aors = 101
direct_media = no

[101-auth]
type = auth
auth_type = userpass
username = 101
password = 101

[101]
type = aor
max_contacts = 1

; --- PROD: SIPGate Trunking (Vorlage) ---------------------------------------
; #SIPID# / #SIPPASSWORD# aus dem SIPGate-Trunk-Account einsetzen und aktivieren.
;
; [sipgateregister]
; type = registration
; server_uri = sip:#SIPID#@sipconnect.sipgate.de
; client_uri = sip:#SIPID#@sipconnect.sipgate.de
; contact_user = inbound-calls
; outbound_auth = sipgateauthreg
;
; [sipgateauthreg]
; type = auth
; auth_type = userpass
; username = #SIPID#
; password = #SIPPASSWORD#
;
; [sipgateauth]
; type = auth
; auth_type = userpass
; username = #SIPID#
; password = #SIPPASSWORD#
;
; [sipgateendpoint]
; type = endpoint
; aors = sipgateaor
; context = inbound
; outbound_auth = sipgateauth
; from_domain = sipconnect.sipgate.de
; from_user = #SIPID#
; allow = !all,g722,alaw,ulaw
; direct_media = no
; transport = transport-udp
;
; [sipgateaor]
; type = aor
; contact = sip:sipconnect.sipgate.de
;
; [sipgateidentify]
; type = identify
; match = sipconnect.sipgate.de
; match = 217.10.68.150:5060
; endpoint = sipgateendpoint
