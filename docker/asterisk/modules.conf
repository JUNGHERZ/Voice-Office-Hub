; Schlanke Modul-Konfiguration für den eingebetteten Asterisk.
; autoload=yes lädt die Standardmodule (inkl. pjsip, ARI/http, bridging, RTP); die
; folgenden noloads schalten ungenutzte/fehlerhafte Stock-Module ab (weniger Log-Lärm,
; vermeidet u.a. den Parse-Fehler in der mitgelieferten geolocation.conf).

[modules]
autoload = yes

noload = res_geolocation.so
noload = res_config_ldap.so
noload = app_voicemail_imap.so
noload = app_voicemail_odbc.so
noload = chan_unistim.so
noload = pbx_dundi.so
noload = chan_sip.so
noload = app_macro.so
noload = cdr_pgsql.so
noload = cdr_radius.so
noload = cdr_sqlite3_custom.so
noload = cdr_tds.so
noload = cel_radius.so
noload = cel_pgsql.so
noload = cel_tds.so
noload = res_config_pgsql.so
noload = res_config_odbc.so
noload = cel_sqlite3_custom.so
noload = res_hep.so
noload = res_hep_rtcp.so
noload = res_hep_pjsip.so
