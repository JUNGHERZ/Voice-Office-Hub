<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Warmer Orange-Verlauf (GlassKit-Akzent #f5a623 → #d4692a) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5a623"/>
      <stop offset="0.55" stop-color="#e07a24"/>
      <stop offset="1" stop-color="#d4692a"/>
    </linearGradient>
    <!-- Glanz-/Glas-Lichtstreifen oben -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Abgerundetes Quadrat (iOS-Squircle-Anmutung) -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>
  <!-- Glas-Lichtstreifen -->
  <rect x="16" y="16" width="480" height="260" rx="112" fill="url(#gloss)"/>

  <!-- Monogramm „EV" -->
  <g fill="#ffffff" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif"
     font-weight="700" font-size="240" text-anchor="middle">
    <text x="256" y="338" letter-spacing="-8">EV</text>
  </g>
</svg>
