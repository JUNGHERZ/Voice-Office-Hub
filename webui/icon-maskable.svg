<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5a623"/>
      <stop offset="0.55" stop-color="#e07a24"/>
      <stop offset="1" stop-color="#d4692a"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Vollflächiger Hintergrund (maskable-safe: kein Rand wird abgeschnitten) -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="300" fill="url(#gloss)"/>

  <!-- Monogramm im sicheren inneren Bereich (~60% Höhe, zentriert) -->
  <g fill="#ffffff" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif"
     font-weight="700" font-size="200" text-anchor="middle">
    <text x="256" y="322" letter-spacing="-6">EV</text>
  </g>
</svg>
